<!--
    Uma condição aninhada é uma condição dentro da outra

    basicamente um if e else dentro do else - condição aninhada
    if (cond) {
        bloco 1
    } else {
        if (cond2) {
            bloco 2
        } else {
            bloco 3 
        }
    }

    Condição múltipla é quando é usada várias condições para depois, chegar a um resultado.

    Nela, usamos uma expressão chamada switch.
    ex.:

    switch (expressão) {
        case valor 1:
        bloco (códigos)
        break

        case valor 2:
        bloco
        break

        case valor 3:
        bloco
        break

        default:
        bloco
        break
    }
    com a expressão, o resultado dela vai par algum desses cases. Se por exemplo for para o case 2, ele irá realizar os códigos que estão no case 2.
    break serve para o resultado de um dos blocos parar nela.
-->
